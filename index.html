<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Archive</title>
    <style>
        :root { --sidebar-bg: #ebf2ff; --primary: #2563eb; --dark: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: white; overflow: hidden; }

        /* [사이드바 절대 고정] */
        .sidebar { 
            width: 260px; background: var(--sidebar-bg); height: 100vh; 
            position: fixed; left: 0; top: 0; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-logo { 
            display: block; text-decoration: none; color: var(--dark); 
            font-size: 24px; font-weight: 800; line-height: 1.2;
            margin: 40px 0 50px 30px; 
        }
        .nav-item { 
            padding: 14px 18px; text-decoration: none; color: var(--dark); 
            border-radius: 10px; margin: 0 20px 8px 20px; font-weight: 500; 
            display: flex; align-items: center; gap: 10px;
        }
        .nav-divider { height: 1px; background: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 - 사이드바 너비만큼 마진 고정] */
        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; height: 100vh; overflow-y: auto; background: white; }
        h1 { font-size: 44px; font-weight: 800; margin-bottom: 15px; color: #0f172a; line-height: 1.2; }
        .slogan { border-left: 4px solid var(--primary); padding-left: 15px; font-style: italic; color: #94a3b8; font-size: 1.1rem; margin-bottom: 40px; }
        
        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); table-layout: fixed; }
        .board-table th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid var(--border); color: #64748b; }
        .board-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; padding-bottom: 50px; }
        .page-btn { padding: 8px 20px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 6px; cursor: pointer; font-weight: 600; }
        .page-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <h1>Welcome</h1>
        <div class="slogan">"Where Knowledge Meets Innovation"</div>
        <table class="board-table">
            <thead><tr><th style="width:140px;">카테고리</th><th>제목</th><th style="width:110px;">날짜</th></tr></thead>
            <tbody id="board-body"></tbody>
        </table>
        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="movePage(-1)">이전</button>
            <span id="pageInfo">1 / 1</span>
            <button class="page-btn" id="nextBtn" onclick="movePage(1)">다음</button>
        </div>
    </main>
    <script>
        let curPage = 1; const perPage = 20;
        function update() {
            const rows = Array.from(document.querySelectorAll('#board-body tr'));
            const totalPages = Math.max(Math.ceil(rows.length / perPage), 1);
            if (curPage < 1) curPage = 1;
            if (curPage > totalPages) curPage = totalPages;
            rows.forEach((r, i) => { r.style.display = (i >= (curPage-1)*perPage && i < curPage*perPage) ? "" : "none"; });
            document.getElementById('pageInfo').innerText = curPage + " / " + totalPages;
            document.getElementById('prevBtn').disabled = (curPage === 1);
            document.getElementById('nextBtn').disabled = (curPage === totalPages);
        }
        function movePage(s) { curPage += s; update(); }
        window.onload = update;
    </script>
</body>
</html>
