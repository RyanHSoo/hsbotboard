<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Archive</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 (PC용) */
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 30px 20px; display: flex; flex-direction: column; z-index: 100; }
        .sidebar h2 { color: var(--primary); font-size: 1.4rem; margin-bottom: 40px; letter-spacing: -1px; }
        .nav-item { padding: 14px 18px; text-decoration: none; color: var(--text); border-radius: 10px; margin-bottom: 8px; font-weight: 500; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: #f1f5f9; color: var(--primary); }

        /* 본문 영역 */
        .main-content { flex: 1; padding: 60px; overflow-y: auto; display: flex; align-items: center; justify-content: center; }
        .welcome-card { background: white; padding: 50px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; border: 1px solid #e2e8f0; }
        .welcome-card h1 { font-size: 2rem; margin-bottom: 15px; color: #0f172a; }
        .welcome-card p { color: #64748b; line-height: 1.6; }

        /* 모바일 최적화 (768px 이하) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; border-right: none; border-bottom: 1px solid #e2e8f0; flex-direction: row; overflow-x: auto; white-space: nowrap; box-sizing: border-box; }
            .sidebar h2 { display: none; }
            .nav-item { margin-bottom: 0; margin-right: 10px; padding: 10px 15px; font-size: 0.9rem; flex-shrink: 0; }
            .main-content { padding: 30px 15px; }
            .welcome-card { padding: 30px 20px; }
        }
    </style>
</head>

        </div>
    </div>
</body>
