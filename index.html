<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryan's Archive</title>
    <style>
        :root { --sidebar-color: #ebf2ff; --primary: #2563eb; --dark: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: white; display: flex; height: 100vh; overflow: hidden; }

        /* [사이드바 - 본문 레이아웃과 완전히 분리하여 박제] */
        .sidebar { 
            position: fixed; left: 0; top: 0; width: 260px; height: 100vh; 
            background: var(--sidebar-color); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 9999;
        }
        .sidebar-logo { 
            display: block; text-decoration: none; color: var(--dark); 
            font-size: 24px; font-weight: 800; line-height: 1;
            margin: 40px 0 50px 30px; /* 01 파일과 픽셀 단위로 100% 일치 */
        }
        .nav-item { 
            display: flex; align-items: center; gap: 10px; padding: 14px 18px; 
            margin: 0 20px 8px 20px; text-decoration: none; color: var(--dark); 
            font-weight: 500; border-radius: 10px; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.8); color: var(--primary); }
        .nav-divider { height: 1px; background: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 - 사이드바 너비만큼 강제 마진 부여] */
        .main-content { 
            margin-left: 260px; flex: 1; height: 100vh; overflow-y: auto;
            padding: 60px 80px; background: white; 
        }
        .header-section { margin-bottom: 40px; }
        .header-section h1 { font-size: 44px; font-weight: 800; margin-bottom: 15px; color: #0f172a; line-height: 1.1; }
        .slogan { border-left: 4px solid var(--primary); padding-left: 15px; font-style: italic; color: #94a3b8; font-size: 18px; }
        
        .search-container { max-width: 800px; margin-bottom: 50px; }
        .search-input { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid var(--border); background: #f8fafc; outline: none; font-size: 16px; }

        .section-title { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 25px; }
        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; table-layout: fixed; margin-bottom: 20px; }
        .board-table th { background: #f8fafc; padding: 15px 20px; text-align: left; border-bottom: 2px solid var(--border); color: #64748b; font-size: 14px; }
        .board-table td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 15px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        #no-result-msg { display: none; text-align: center; padding: 50px; color: #94a3b8; font-size: 16px; border: 1px dashed var(--border); border-radius: 12px; margin-top: 10px; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding-bottom: 60px; }
        .page-btn { padding: 10px 25px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; font-weight: 600; cursor: pointer; }
        .page-btn:disabled { border-color: #cbd5e1; color: #cbd5e1; cursor: not-allowed; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { position: relative; width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; border-bottom: 1px solid var(--border); }
            .sidebar-logo, .nav-divider { display: none; }
            .nav-item { margin: 0 8px 0 0; padding: 10px 15px; flex-shrink: 0; }
            .main-content { margin-left: 0; padding: 30px 20px; flex: none; height: auto; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <header class="header-section">
            <h1>Welcome to Ryan's Private Archive</h1>
            <div class="slogan">"Where Knowledge Meets Innovation"</div>
        </header>
        <section class="search-container">
            <input type="text" id="main-search" class="search-input" placeholder="전체 검색 (Enter)..." onkeypress="if(event.keyCode==13){handleSearch();}">
        </section>
        <section>
            <div class="section-title">✨ Recent Updates</div>
            <table class="board-table" id="data-table">
                <thead><tr><th style="width:140px;">카테고리</th><th style="width:110px;">날짜</th><th>제목</th></tr></thead>
                <tbody id="board-body"></tbody>
            </table>
            <div id="no-result-msg">검색 결과가 없습니다. 🔍</div>
            <div class="pagination" id="pagination-controls">
                <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전</button>
                <span id="page-info">1 / 1</span>
                <button class="page-btn" id="next-btn" onclick="changePage(1)">다음</button>
            </div>
        </section>
    </main>
    <script>
        let curPage = 1; let pSize = (window.innerWidth <= 768) ? 10 : 20;
        function render() {
            const rows = document.querySelectorAll('#board-body tr');
            const total = Math.ceil(rows.length / pSize) || 1;
            const start = (curPage - 1) * pSize; const end = start + pSize;
            rows.forEach((row, i) => { row.style.display = (i >= start && i < end) ? "" : "none"; });
            document.getElementById('page-info').innerText = `${curPage} / ${total}`;
            document.getElementById('prev-btn').disabled = (curPage === 1);
            document.getElementById('next-btn').disabled = (curPage === total);
        }
        function changePage(s) { curPage += s; render(); document.querySelector('.main-content').scrollTop = 0; }
        function handleSearch() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const rows = document.querySelectorAll('#board-body tr');
            const noRes = document.getElementById('no-result-msg');
            const table = document.getElementById('data-table');
            const pg = document.getElementById('pagination-controls');
            if (q === "") { pg.style.display='flex'; noRes.style.display='none'; table.style.display='table'; render(); return; }
            pg.style.display='none';
            let matchCount = 0;
            rows.forEach(row => {
                const isMatch = row.innerText.toLowerCase().includes(q);
                row.style.display = isMatch ? "" : "none";
                if(isMatch) matchCount++;
            });
            table.style.display = matchCount === 0 ? 'none' : 'table';
            noRes.style.display = matchCount === 0 ? 'block' : 'none';
        }
        window.onload = render;
    </script>
</body>
</html>
