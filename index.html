<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryan's Archive</title>
    <style>
        :root { --sidebar-bg: #ebf2ff; --primary: #2563eb; --dark: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: white; overflow: hidden; }

        /* [사이드바 - 01 파일과 100% 동일 박제] */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 9999; }
        .sidebar-logo { display: block; text-decoration: none; color: var(--dark); font-size: 24px; font-weight: 800; margin: 40px 0 50px 30px; line-height: 1.2; }
        .nav-item { padding: 14px 18px; text-decoration: none; color: var(--dark); border-radius: 10px; margin: 0 20px 8px 20px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.8); color: var(--primary); }
        .nav-divider { height: 1px; background: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 영역 - 마진 고정] */
        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; height: 100vh; overflow-y: auto; background: white; }
        .header-section { margin-bottom: 40px; }
        .header-section h1 { font-size: 44px; font-weight: 800; margin-bottom: 10px; color: #0f172a; line-height: 1.1; }
        .slogan { border-left: 4px solid var(--primary); padding-left: 15px; font-style: italic; color: #94a3b8; font-size: 18px; }
        
        .search-container { max-width: 800px; margin: 40px 0; }
        .search-input { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid var(--border); background: #f8fafc; outline: none; font-size: 16px; }

        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); table-layout: fixed; }
        .board-table th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid var(--border); color: #64748b; font-size: 14px; }
        .board-table td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #no-result-msg { display: none; text-align: center; padding: 50px; color: #94a3b8; font-size: 16px; border: 1px dashed var(--border); border-radius: 12px; margin-top: 10px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; padding-bottom: 60px; }
        .page-btn { padding: 10px 25px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; font-weight: 600; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { position: relative; width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; border-bottom: 1px solid var(--border); }
            .sidebar-logo, .nav-divider { display: none; }
            .main-content { margin-left: 0; padding: 30px 20px; flex: none; height: auto; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <header class="header-section">
            <h1>Welcome to Ryan's Private Archive</h1>
            <div class="slogan">"Where Knowledge Meets Innovation"</div>
        </header>
        <div class="search-container">
            <input type="text" id="main-search" class="search-input" placeholder="전체 검색 (Enter)..." onkeypress="if(event.keyCode==13){handleSearch();}">
        </div>
        <table class="board-table" id="data-table">
            <thead><tr><th style="width:140px;">카테고리</th><th style="width:110px;">날짜</th><th>제목</th></tr></thead>
            <tbody id="board-body"></tbody>
        </table>
        <div id="no-result-msg">검색 결과가 없습니다. 🔍</div>
        <div class="pagination" id="pg-box">
            <button class="page-btn" id="prevBtn" onclick="movePage(-1)">이전</button>
            <span id="pageInfo">1 / 1</span>
            <button class="page-btn" id="nextBtn" onclick="movePage(1)">다음</button>
        </div>
    </main>
    <script>
        let curPage = 1;
        const getPerPage = () => window.innerWidth <= 768 ? 10 : 20;
        function update() {
            const rows = Array.from(document.querySelectorAll('#board-body tr'));
            const perPage = getPerPage();
            const total = Math.max(Math.ceil(rows.length / perPage), 1);
            if (curPage < 1) curPage = 1; if (curPage > total) curPage = total;
            rows.forEach((r, i) => { r.style.display = (i >= (curPage-1)*perPage && i < curPage*perPage) ? "" : "none"; });
            document.getElementById('pageInfo').innerText = `${curPage} / ${total}`;
            document.getElementById('prevBtn').disabled = (curPage === 1);
            document.getElementById('nextBtn').disabled = (curPage === total);
        }
        function movePage(s) { curPage += s; update(); }
        function handleSearch() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const rows = document.querySelectorAll('#board-body tr');
            const noRes = document.getElementById('no-result-msg');
            const table = document.getElementById('data-table');
            const pg = document.getElementById('pg-box');
            if (q === "") { pg.style.display='flex'; noRes.style.display='none'; table.style.display='table'; update(); return; }
            pg.style.display='none';
            let matchCount = 0;
            rows.forEach(r => {
                const isMatch = r.innerText.toLowerCase().includes(q);
                r.style.display = isMatch ? "" : "none";
                if(isMatch) matchCount++;
            });
            table.style.display = matchCount === 0 ? 'none' : 'table';
            noRes.style.display = matchCount === 0 ? 'block' : 'none';
        }
        window.onload = update; window.onresize = update;
    </script>
</body>
</html>
