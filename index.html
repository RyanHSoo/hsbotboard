<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryan's Archive</title>
    <style>
        :root { --sidebar-color: #ebf2ff; --primary-blue: #2563eb; --text-dark: #1e293b; --border-color: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: white; display: flex; }
        
        /* [사이드바 - 절대 고정 및 수치 일치] */
        .sidebar { 
            width: 260px; background-color: var(--sidebar-color); height: 100vh; 
            position: fixed; left: 0; top: 0; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 1000; padding: 0; box-sizing: border-box;
        }
        .sidebar-logo { 
            text-decoration: none; color: var(--text-dark); font-size: 1.5rem; font-weight: 800; 
            margin: 40px 0 50px 30px; display: block; line-height: 1; /* line-height 고정으로 높이 오차 방지 */
        }
        .nav-item { 
            padding: 14px 18px; text-decoration: none; color: var(--text-dark); 
            border-radius: 10px; margin: 0 20px 8px 20px; font-weight: 500; 
            display: flex; align-items: center; gap: 10px; box-sizing: border-box;
        }
        .nav-item:hover { background-color: rgba(255, 255, 255, 0.8); color: var(--primary-blue); }
        .nav-divider { height: 1px; background-color: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 영역] */
        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; min-height: 100vh; background: white; box-sizing: border-box; }
        .header-section { margin-bottom: 40px; }
        .header-section h1 { font-size: 2.8rem; font-weight: 800; margin: 0 0 15px 0; color: #0f172a; }
        .slogan { border-left: 4px solid var(--primary-blue); padding-left: 15px; font-style: italic; color: #94a3b8; font-size: 1.1rem; }
        
        .search-container { max-width: 800px; margin-bottom: 50px; }
        .search-input { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid var(--border-color); background-color: #f8fafc; outline: none; font-size: 1rem; box-sizing: border-box; }

        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; table-layout: fixed; margin-bottom: 20px; }
        .board-table th { background-color: #f8fafc; padding: 15px 20px; text-align: left; border-bottom: 2px solid var(--border-color); color: #64748b; font-size: 0.9rem; }
        .board-table td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding-bottom: 60px; }
        .page-btn { padding: 10px 25px; border: 1px solid var(--primary-blue); background: white; color: var(--primary-blue); border-radius: 8px; font-weight: 600; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { position: relative; width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .sidebar-logo, .nav-divider { display: none; }
            .nav-item { margin: 0 8px 0 0; padding: 10px 15px; font-size: 0.85rem; flex-shrink: 0; }
            .main-content { margin-left: 0; padding: 40px 20px; flex: none; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <header class="header-section">
            <h1>Welcome to Ryan's Private Archive</h1>
            <div class="slogan">"Where Knowledge Meets Innovation"</div>
        </header>
        <section class="search-container">
            <input type="text" id="main-search" class="search-input" placeholder="전체 검색 (Enter)..." onkeypress="if(event.keyCode==13){handleSearch();}">
        </section>
        <section id="updates-section">
            <div class="section-title">✨ Recent Updates</div>
            <table class="board-table" id="data-table">
                <thead><tr><th style="width:140px;">카테고리</th><th style="width:110px;">날짜</th><th>제목</th></tr></thead>
                <tbody id="board-body"></tbody>
            </table>
            <div id="pagination-controls" class="pagination">
                <button class="page-btn" onclick="changePage(-1)">이전</button>
                <span id="page-info">1 / 1</span>
                <button class="page-btn" onclick="changePage(1)">다음</button>
            </div>
        </section>
    </main>
    </body>
</html>
