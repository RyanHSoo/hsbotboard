<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>01 Daily News - Ryan's Archive</title>
    <style>
        :root { --sidebar-bg: #ebf2ff; --primary: #2563eb; --dark: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: white; overflow: hidden; }

        /* [사이드바 - index.html과 100% 동일 박제] */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 9999; }
        .sidebar-logo { display: block; text-decoration: none; color: var(--dark); font-size: 24px; font-weight: 800; margin: 40px 0 50px 30px; line-height: 1; }
        .nav-item { padding: 14px 18px; text-decoration: none; color: var(--dark); border-radius: 10px; margin: 0 20px 8px 20px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .nav-active { background: white; color: var(--primary); border: 1px solid var(--border); }
        .nav-divider { height: 1px; background: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; height: 100vh; overflow-y: auto; background: white; }
        h1 { font-size: 35px; font-weight: 800; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; color: #0f172a; }
        
        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); table-layout: fixed; }
        .board-table th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid var(--border); color: #64748b; font-size: 14px; }
        .board-table td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 15px; cursor: pointer; }

        /* [증시/동향 아코디언 상세 내역 스타일] */
        .content-row { display: none; background: #fcfcfc; }
        .detail-box { padding: 30px; border-left: 4px solid var(--primary); background: white; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .market-card { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .market-card span { font-size: 11px; color: #64748b; display: block; margin-bottom: 4px; }
        .market-card strong { font-size: 16px; color: var(--dark); }
        .news-list { list-style: none; }
        .news-list li { margin-bottom: 10px; line-height: 1.5; padding-left: 18px; position: relative; }
        .news-list li::before { content: "•"; position: absolute; left: 0; color: var(--primary); font-weight: bold; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; padding-bottom: 50px; }
        .page-btn { padding: 8px 20px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 6px; cursor: pointer; font-weight: 600; }
        .page-btn:disabled { border-color: #cbd5e1; color: #cbd5e1; cursor: not-allowed; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { position: relative; width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; border-bottom: 1px solid var(--border); }
            .sidebar-logo, .nav-divider { display: none; }
            .main-content { margin-left: 0; padding: 30px 20px; flex: none; height: auto; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item nav-active">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <h1>01 Daily News</h1>
        <table class="board-table">
            <thead><tr><th style="width:60px;">No</th><th style="width:120px;">날짜</th><th>제목 (클릭하여 브리핑 보기)</th></tr></thead>
            <tbody id="board-body">
                <tr onclick="toggle('row-1')"><td>1</td><td>2026.04.04</td><td>[브리핑] 미 증시 혼조 및 반도체 섹터 강세</td></tr>
                <tr class="content-row" id="row-1"><td colspan="3"><div class="detail-box">
                    <div class="market-grid">
                        <div class="market-card"><span>KOSPI</span><strong>2,745.22</strong></div>
                        <div class="market-card"><span>NASDAQ</span><strong>16,340.55</strong></div>
                        <div class="market-card"><span>USD/KRW</span><strong>1,348.50</strong></div>
                    </div>
                    <ul class="news-list">
                        <li>삼성전자 AI 메모리 반도체 공급 계약 체결로 3% 급등</li>
                        <li>연준 위원 매파적 발언에 따른 기술주 관망세</li>
                    </ul>
                </div></td></tr>
                </tbody>
        </table>
        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="movePage(-1)">이전</button>
            <span id="pageInfo">1 / 1</span>
            <button class="page-btn" id="nextBtn" onclick="movePage(1)">다음</button>
        </div>
    </main>
    <script>
        let curPage = 1;
        const getPerPage = () => window.innerWidth <= 768 ? 10 : 20;

        function update() {
            const rows = Array.from(document.querySelectorAll('#board-body tr:not(.content-row)'));
            const perPage = getPerPage();
            const totalPages = Math.max(Math.ceil(rows.length / perPage), 1);
            if (curPage < 1) curPage = 1; if (curPage > totalPages) curPage = totalPages;
            rows.forEach((r, i) => {
                const isVisible = i >= (curPage - 1) * perPage && i < curPage * perPage;
                r.style.display = isVisible ? "" : "none";
                const next = r.nextElementSibling;
                if (next && next.classList.contains('content-row')) next.style.display = 'none';
            });
            document.getElementById('pageInfo').innerText = `${curPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = (curPage === 1);
            document.getElementById('nextBtn').disabled = (curPage === totalPages);
        }

        function toggle(id) {
            const el = document.getElementById(id);
            const isVisible = el.style.display === 'table-row';
            document.querySelectorAll('.content-row').forEach(r => r.style.display = 'none');
            if (!isVisible) el.style.display = 'table-row';
        }

        function movePage(s) { curPage += s; update(); document.querySelector('.main-content').scrollTop = 0; }
        window.onload = update; window.onresize = update;
    </script>
</body>
</html>
