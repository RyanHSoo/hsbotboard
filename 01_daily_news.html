<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>01 Daily News - Ryan's Archive</title>
    <style>
        :root { --sidebar-color: #ebf2ff; --primary-blue: #2563eb; --text-dark: #1e293b; --border-color: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background-color: white; overflow: hidden; }
        
        /* [사이드바] - index.html과 100% 동일 고정 */
        .sidebar { 
            width: 260px; background-color: var(--sidebar-color); height: 100vh; 
            position: fixed; left: 0; top: 0; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 1000; padding: 0; box-sizing: border-box;
        }
        .sidebar-logo { 
            text-decoration: none; color: var(--text-dark); font-size: 1.5rem; font-weight: 800; 
            margin: 40px 0 50px 30px; display: block; line-height: 1.2; 
        }
        .nav-item { 
            padding: 14px 18px; text-decoration: none; color: var(--text-dark); 
            border-radius: 10px; margin: 0 20px 8px 20px; font-weight: 500; 
            display: flex; align-items: center; gap: 10px; box-sizing: border-box;
        }
        .nav-item:hover { background-color: rgba(255, 255, 255, 0.8); color: var(--primary-blue); }
        .nav-active { background-color: rgba(255, 255, 255, 0.9); color: var(--primary-blue); border: 1px solid var(--border-color); }
        .nav-divider { height: 1px; background-color: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 영역] */
        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; height: 100vh; overflow-y: auto; background: white; box-sizing: border-box; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0 0 25px 0; border-left: 5px solid var(--primary-blue); padding-left: 15px; color: #0f172a; }
        .search-container { max-width: 500px; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 14px 22px; border-radius: 30px; border: 1px solid var(--border-color); background-color: #f8fafc; outline: none; font-size: 1rem; box-sizing: border-box; }

        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; table-layout: fixed; margin-bottom: 20px; }
        .board-table th { background-color: #f8fafc; padding: 15px 20px; text-align: left; border-bottom: 2px solid var(--border-color); color: #64748b; font-size: 0.85rem; font-weight: 700; }
        .board-table td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; cursor: pointer; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .col-no { width: 60px; text-align: center; color: #94a3b8; }
        .col-date { width: 110px; color: #64748b; }
        .content-row { display: none; background-color: #fafafa; }
        .detail-box { padding: 30px; border-left: 4px solid var(--primary-blue); background: white; }
        #no-result-msg { display: none; text-align: center; padding: 50px; color: #94a3b8; font-size: 1rem; border: 1px dashed var(--border-color); border-radius: 12px; margin-top: 10px; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding-bottom: 60px; }
        .page-btn { padding: 10px 25px; border: 1px solid var(--primary-blue); background: white; color: var(--primary-blue); border-radius: 8px; font-weight: 600; cursor: pointer; }
        .page-btn:disabled { border-color: #cbd5e1; color: #cbd5e1; cursor: not-allowed; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { position: relative; width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .sidebar-logo, .nav-divider { display: none; }
            .nav-item { margin: 0 8px 0 0; padding: 10px 15px; font-size: 0.85rem; flex-shrink: 0; }
            .main-content { margin-left: 0; padding: 30px 20px; flex: none; height: auto; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item nav-active">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <h1>01 Daily News</h1>
        <div class="search-container">
            <input type="text" id="local-search" class="search-input" placeholder="날짜나 제목 검색 (Enter)..." onkeypress="if(event.keyCode==13){filterBoard();}">
        </div>
        <table class="board-table" id="data-table">
            <thead><tr><th class="col-no">No</th><th class="col-date">날짜</th><th>제목</th></tr></thead>
            <tbody id="board-body"></tbody>
        </table>
        <div id="no-result-msg">검색 결과가 없습니다. 🔍</div>
        <div class="pagination" id="pagination-controls">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전</button>
            <span id="page-info">1 / 1</span>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">다음</button>
        </div>
    </main>
    <script>
        let curPage = 1; let pSize = (window.innerWidth <= 768) ? 10 : 20;
        function render() {
            const rows = document.querySelectorAll('#board-body tr:not(.content-row)');
            const total = Math.ceil(rows.length / pSize) || 1;
            if(curPage > total) curPage = total;
            const start = (curPage - 1) * pSize; const end = start + pSize;
            rows.forEach((row, i) => {
                row.style.display = (i >= start && i < end) ? "" : "none";
                const nextRow = row.nextElementSibling;
                if(nextRow && nextRow.classList.contains('content-row')) nextRow.style.display = 'none';
            });
            document.getElementById('page-info').innerText = `${curPage} / ${total}`;
            document.getElementById('prev-btn').disabled = (curPage === 1);
            document.getElementById('next-btn').disabled = (curPage === total);
        }
        function changePage(s) { curPage += s; render(); document.querySelector('.main-content').scrollTop = 0; }
        function toggleContent(id) {
            const row = document.getElementById(id);
            const isVisible = row.style.display === 'table-row';
            document.querySelectorAll('.content-row').forEach(r => r.style.display = 'none');
            if (!isVisible) row.style.display = 'table-row';
        }
        function filterBoard() {
            const q = document.getElementById('local-search').value.toLowerCase();
            const rows = document.querySelectorAll('#board-body tr:not(.content-row)');
            const pg = document.getElementById('pagination-controls');
            const noRes = document.getElementById('no-result-msg');
            const table = document.getElementById('data-table');
            if(q === "") { pg.style.display = 'flex'; noRes.style.display = 'none'; table.style.display = 'table'; render(); return; }
            pg.style.display = 'none'; let matchCount = 0;
            rows.forEach(row => {
                const isMatch = row.innerText.toLowerCase().includes(q);
                row.style.display = isMatch ? "" : "none";
                if(isMatch) matchCount++;
                const nextRow = row.nextElementSibling;
                if(nextRow && nextRow.classList.contains('content-row')) nextRow.style.display = 'none';
            });
            if(matchCount === 0) { table.style.display = 'none'; noRes.style.display = 'block'; } 
            else { table.style.display = 'table'; noRes.style.display = 'none'; }
        }
        window.addEventListener('load', render);
        window.addEventListener('resize', () => {
            const nSize = (window.innerWidth <= 768) ? 10 : 20;
            if(nSize !== pSize) { pSize = nSize; render(); }
        });
    </script>
</body>
</html>
