    <style>
        :root { --sidebar-color: #ebf2ff; --primary-blue: #2563eb; --text-dark: #1e293b; --border-color: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: white; display: flex; }
        
        /* [사이드바 - index와 100% 동일 고정] */
        .sidebar { 
            width: 260px; background-color: var(--sidebar-color); height: 100vh; 
            position: fixed; left: 0; top: 0; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-logo { 
            text-decoration: none; color: var(--text-dark); font-size: 1.5rem; 
            font-weight: 800; margin: 40px 0 50px 30px; display: block; line-height: 1;
        }
        .nav-item { 
            padding: 14px 18px; text-decoration: none; color: var(--text-dark); 
            border-radius: 10px; margin: 0 20px 8px 20px; font-weight: 500; 
            display: flex; align-items: center; gap: 10px;
        }
        .nav-active { background-color: rgba(255, 255, 255, 0.9); color: var(--primary-blue); border: 1px solid var(--border-color); }
        .nav-divider { height: 1px; background-color: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 영역] */
        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; min-height: 100vh; background: white; }
        h1 { font-size: 2.2rem; font-weight: 800; margin: 0 0 25px 0; border-left: 5px solid var(--primary-blue); padding-left: 15px; }
        
        @media (max-width: 768px) {
            .sidebar { position: relative; width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; }
            .sidebar-logo, .nav-divider { display: none; }
            .main-content { margin-left: 0; padding: 40px 20px; }
        }
    </style>
