<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>01 Daily News - Ryan's Archive</title>
    <style>
        :root { --sidebar-color: #ebf2ff; --primary: #2563eb; --dark: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: white; display: flex; height: 100vh; overflow: hidden; }

        /* [사이드바 - index.html과 100% 동일 박제] */
        .sidebar { 
            position: fixed; left: 0; top: 0; width: 260px; height: 100vh; 
            background: var(--sidebar-color); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 9999;
        }
        .sidebar-logo { 
            display: block; text-decoration: none; color: var(--dark); 
            font-size: 24px; font-weight: 800; line-height: 1.2;
            margin: 40px 0 50px 30px;
        }
        .nav-item { 
            display: flex; align-items: center; gap: 10px; padding: 14px 18px; 
            margin: 0 20px 8px 20px; text-decoration: none; color: var(--dark); 
            font-weight: 500; border-radius: 10px; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.8); color: var(--primary); }
        .nav-active { background: rgba(255, 255, 255, 0.9); color: var(--primary); border: 1px solid var(--border); }
        .nav-divider { height: 1px; background: rgba(30, 41, 59, 0.1); margin: 10px 30px 15px 30px; }

        /* [본문 영역 - 사이드바 너비만큼 마진 고정] */
        .main-content { margin-left: 260px; flex: 1; padding: 60px 80px; height: 100vh; overflow-y: auto; background: white; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; color: #0f172a; line-height: 1.2; }
        .search-container { max-width: 500px; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 14px 22px; border-radius: 30px; border: 1px solid var(--border); background: #f8fafc; outline: none; font-size: 1rem; }

        .board-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; table-layout: fixed; margin-bottom: 20px; }
        .board-table th { background: #f8fafc; padding: 15px 20px; text-align: left; border-bottom: 2px solid var(--border); color: #64748b; font-size: 0.85rem; font-weight: 700; }
        .board-table td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; cursor: pointer; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        
        .col-no { width: 60px; text-align: center; color: #94a3b8; }
        .col-date { width: 110px; color: #64748b; }
        .content-row { display: none; background: #fafafa; }
        .detail-box { padding: 30px; border-left: 4px solid var(--primary); background: white; }
        #no-result-msg { display: none; text-align: center; padding: 50px; color: #94a3b8; font-size: 1rem; border: 1px dashed var(--border); border-radius: 12px; margin-top: 10px; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding-bottom: 60px; }
        .page-btn { padding: 10px 25px; border: 1px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; font-weight: 600; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { position: relative; width: 100%; height: auto; padding: 10px; flex-direction: row; overflow-x: auto; border-bottom: 1px solid var(--border); }
            .sidebar-logo, .nav-divider { display: none; }
            .nav-item { margin: 0 8px 0 0; padding: 10px 15px; flex-shrink: 0; }
            .main-content { margin-left: 0; padding: 30px 20px; flex: none; height: auto; }
            .col-no { display: none; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="sidebar-logo">Ryan's Archive</a>
        <a href="memo.html" class="nav-item">📝 Memo</a>
        <div class="nav-divider"></div>
        <a href="01_daily_news.html" class="nav-item nav-active">📰 01 Daily News</a>
        <a href="02_mckinsey_report.html" class="nav-item">📈 02 McKinsey Report</a>
        <a href="03_ai_learning.html" class="nav-item">🤖 03 AI Learning</a>
        <a href="04_finance.html" class="nav-item">💰 04 Finance</a>
        <a href="05_humanities.html" class="nav-item">📖 05 Humanities</a>
    </nav>
    <main class="main-content">
        <h1>01 Daily News</h1>
        <div class="search-container"><input type="text" id="local-search" class="search-input" placeholder="검색 (Enter)..." onkeypress="if(event.keyCode==13){filterBoard();}"></div>
        <table class="board-table" id="data-table">
            <thead><tr><th class="col-no">No</th><th class="col-date">날짜</th><th>제목</th></tr></thead>
            <tbody id="board-body"></tbody>
        </table>
        <div id="no-result-msg">검색 결과가 없습니다. 🔍</div>
        <div class="pagination" id="pagination-controls">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전</button>
            <span id="page-info">1 / 1</span>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">다음</button>
        </div>
    </main>
    <script>
        let curPage = 1; let pSize = 20;
        function render() {
            const rows = document.querySelectorAll('#board-body tr:not(.content-row)');
            const total = Math.ceil(rows.length / pSize) || 1;
            const start = (curPage - 1) * pSize; const end = start + pSize;
            rows.forEach((row, i) => {
                row.style.display = (i >= start && i < end) ? "" : "none";
                const nextRow = row.nextElementSibling;
                if(nextRow && nextRow.classList.contains('content-row')) nextRow.style.display = 'none';
            });
            document.getElementById('page-info').innerText = `${curPage} / ${total}`;
            document.getElementById('prev-btn').disabled = (curPage === 1);
            document.getElementById('next-btn').disabled = (curPage === total);
        }
        function changePage(s) { curPage += s; render(); }
        function toggleContent(id) {
            const row = document.getElementById(id);
            const isVisible = row.style.display === 'table-row';
            document.querySelectorAll('.content-row').forEach(r => r.style.display = 'none');
            if (!isVisible) row.style.display = 'table-row';
        }
        function filterBoard() {
            const q = document.getElementById('local-search').value.toLowerCase();
            const rows = document.querySelectorAll('#board-body tr:not(.content-row)');
            const pg = document.getElementById('pagination-controls');
            const noRes = document.getElementById('no-result-msg');
            const table = document.getElementById('data-table');
            if(q === "") { pg.style.display='flex'; noRes.style.display='none'; table.style.display='table'; render(); return; }
            pg.style.display='none';
            let matchCount = 0;
            rows.forEach(row => {
                const isMatch = row.innerText.toLowerCase().includes(q);
                row.style.display = isMatch ? "" : "none";
                if(isMatch) matchCount++;
                const nextRow = row.nextElementSibling;
                if(nextRow && nextRow.classList.contains('content-row')) nextRow.style.display = 'none';
            });
            table.style.display = matchCount === 0 ? 'none' : 'table';
            noRes.style.display = matchCount === 0 ? 'block' : 'none';
        }
        window.onload = render;
    </script>
</body>
</html>
